<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Example</title>
</head>
<body>

    <h1>My Interactive Webpage</h1>
    
    <!-- This button triggers the JavaScript function -->
    <button id="actionButton">Click Me</button>
    
    <!-- This paragraph will be updated by the JavaScript file -->
    <p id="output">Waiting for button click...</p>

    <!-- Link the external script.js file here -->
    <!-- The 'defer' attribute ensures the script runs after the HTML parses -->
    <script src="script.js" defer></script>

</body>
</html>
